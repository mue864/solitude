services:
  postgres:
    image: postgres:16-alpine
    container_name: solitude-postgres
    environment:
      POSTGRES_DB: solitude
      POSTGRES_USER: ${POSTGRES_USER:-solitude_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solitude_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-solitude_user} -d solitude" ]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: solitude-minio
    command: server /data --address ":9000" --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-adminpass}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the 'solitude-audio' bucket on first start
  minio-init:
    image: minio/mc:latest
    container_name: solitude-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:-adminpass};
        mc mb --ignore-existing local/solitude-audio;
        mc anonymous set download local/solitude-audio;
        echo 'Bucket ready.';
      "

volumes:
  postgres_data:
  minio_data:
